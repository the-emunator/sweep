name: Build Windows installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the Windows installer
        run: npm run dist:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sweep-windows
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

      - name: Attach installer to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # latest.yml + the .blockmap are what electron-updater reads to
          # detect and delta-download a new patch – they MUST be attached
          # alongside the installer, or auto-update can't see the release.
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          generate_release_notes: true
