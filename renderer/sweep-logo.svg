<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#8576F3"/>
      <stop offset="1" stop-color="#5840D4"/>
    </linearGradient>
    <linearGradient id="bristle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E1DAFF"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>

  <!-- swept particles (the three decision colors) -->
  <circle cx="138" cy="372" r="19" fill="#16C079"/>
  <circle cx="186" cy="398" r="13" fill="#FF9F1C"/>
  <circle cx="228" cy="414" r="9"  fill="#FF4D6D"/>

  <!-- broom: drawn upright, then tilted and nudged for balance -->
  <g transform="translate(2 8) rotate(-21 256 256)">
    <!-- handle -->
    <rect x="244" y="112" width="25" height="184" rx="12.5" fill="#FFFFFF"/>
    <!-- ferrule -->
    <rect x="229" y="290" width="55" height="22" rx="9" fill="#CFC6FF"/>
    <!-- bristle head -->
    <path d="M235 312 H278 L326 412 Q326 423 315 423 H198 Q187 423 187 412 Z" fill="url(#bristle)"/>
    <!-- bristle gaps -->
    <g stroke="#5840D4" stroke-width="7.5" stroke-linecap="round" opacity="0.9">
      <line x1="230" y1="336" x2="217" y2="410"/>
      <line x1="248" y1="336" x2="245" y2="412"/>
      <line x1="266" y1="336" x2="273" y2="412"/>
      <line x1="284" y1="336" x2="298" y2="410"/>
    </g>
  </g>
</svg>
